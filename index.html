<!DOCTYPE html>
<html>
<head>
  <title>Meeting Notice Generator</title>

  <style>
    body { font-family: Arial; padding: 20px; }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
    }

    /* PRINT DOCUMENT STYLE */
    #previewArea {
      width: 210mm;
      min-height: 297mm;
      padding: 25mm;
      margin-top: 20px;
      border: 1px solid #000;
      font-size: 14px;
      line-height: 1.5;
    }

    .center { text-align: center; }
    .right { text-align: right; }
    .bold { font-weight: bold; }

    @media print {
      body * { visibility: hidden; }
      #previewArea, #previewArea * { visibility: visible; }
      #previewArea { position: absolute; left: 0; top: 0; }
    }
  </style>
</head>

<body>

<h2>Meeting Notice Generator</h2>

<label>File Number</label>
<input id="fileNo">

<label>Office Name</label>
<input id="office">

<label>Office Address</label>
<input id="address">

<label>Letter Date</label>
<input type="date" id="letterDate">

<label>Meeting Subject</label>
<textarea id="subject"></textarea>

<label>Body Paragraph (Optional)</label>
<textarea id="bodyText"></textarea>

<label>Meeting Date & Time</label>
<input id="meetingDateTime">

<label>Venue</label>
<input id="venue">

<label>Attendees (one per line)</label>
<textarea id="attendees"></textarea>

<label>Signatory Name</label>
<input id="signName">

<label>Designation</label>
<input id="designation">

<label>Copy To</label>
<textarea id="copyTo"></textarea>

<br>

<button onclick="generatePreview()">Preview</button>
<button onclick="printDocument()">Print / Save PDF</button>

<!-- PREVIEW AREA -->
<div id="previewArea"></div>

<script>
function generatePreview() {
  <!-- let body = document.getElementById("bodyText").value.trim(); -->

  let meetingDateTime = document.getElementById("meetingDateTime").value;
  let venue = document.getElementById("venue").value;
  let subject = document.getElementById("subject").value;

  let userBody = document.getElementById("bodyText").value.trim();

let autoText = `A stakeholder consultation meeting is hereby scheduled on ${meetingDateTime} at ${venue} to discuss ${subject}.`;

let body;

if (userBody === "") {
  body = autoText;
} else {
  body = autoText + " " + userBody;
}

  let attendeesList = document.getElementById("attendees").value.split("\n")
    .map((a, i) => a.trim() ? `<div>(${i+1}) ${a}</div>` : "")
    .join("");

  let copyList = document.getElementById("copyTo").value.split("\n")
    .map((c, i) => c.trim() ? `<div>${i+1}. ${c}</div>` : "")
    .join("");

  let html = `
    <div>
      <div>No. ${document.getElementById("fileNo").value}</div>

      let html = `
  <div>

    <!-- LOGO -->
    <div class="center">
      <img src="tripura.png" style="width:100px; margin-bottom:5px;">
    </div>

    <!-- OFFICE NAME BELOW GOVT TEXT -->
    <div class="center bold" style="margin-top:5px;">
      ${document.getElementById("office").value}
    </div>

    <div class="center">
      ${document.getElementById("address").value}
    </div>

    <br>

    <div>No. ${document.getElementById("fileNo").value}</div>
    <div class="right">Dated, ${document.getElementById("letterDate").value}</div>
      <br>

      <div class="center bold">MEETING NOTICE</div>
      <hr>

      <p style="text-align: justify;">
        ${body}
      </p>

      <p style="text-align: justify;">
        In this context, the below mentioned officials are requested to attend the meeting.
      </p>

      ${attendeesList}

      <br><br>

      <div class="right bold">${document.getElementById("signName").value}</div>
      <div class="right">${document.getElementById("designation").value}</div>

      <br>

      <div>To</div>
      <div>All concerned for kind information.</div>

      <br>

      <div>Copy to:-</div>
      ${copyList}
    </div>
  `;

  document.getElementById("previewArea").innerHTML = html;
}

// PRINT
function printDocument() {
  generatePreview(); // ensure latest data
  window.print();
}
</script>

</body>
</html>
