<!DOCTYPE html>
<html>
<head>
  <title>Meeting Notice Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
    button { padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Meeting Notice Generator</h2>

<label>File Number</label>
<input id="fileNo">

<label>Office Name</label>
<input id="office">

<label>Office Address</label>
<input id="address">

<label>Letter Date</label>
<input type="date" id="letterDate">

<label>Meeting Subject</label>
<textarea id="subject"></textarea>

<label>Meeting Date & Time</label>
<input id="meetingDateTime">

<label>Venue</label>
<input id="venue">

<label>Attendees (one per line)</label>
<textarea id="attendees"></textarea>

<label>Signatory Name</label>
<input id="signName">

<label>Designation</label>
<input id="designation">

<label>Dispatch / Copy To</label>
<textarea id="copyTo"></textarea>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="printPDF()">Print</button>
<button onclick="previewPDF()">Preview</button>
  
<script>
const { jsPDF } = window.jspdf;
</script>
  
<script>
function getPDF() {
  if (!window.jspdf) {
    alert("PDF library not loaded. Check internet.");
    return null;
  }
  return new window.jspdf.jsPDF();
}

function generatePDFDoc() {
  const doc = getPDF();
  if (!doc) return null;

  let y = 15;
  const pageWidth = doc.internal.pageSize.getWidth();

  function left(t, s=6){ doc.text(t || "",15,y); y+=s; }
  function right(t,s=6){ doc.text(t || "",pageWidth-15,y,{align:"right"}); y+=s; }
  function center(t,s=6){ doc.text(t || "",pageWidth/2,y,{align:"center"}); y+=s; }
  function justify(t){
    let split = doc.splitTextToSize(t || "",180);
    doc.text(split,15,y,{maxWidth:180,align:"justify"});
    y+=split.length*6;
  }

  function roman(i){
    const r=["i","ii","iii","iv","v","vi","vii","viii","ix","x"];
    return r[i] || i;
  }

  // HEADER
  left("No. " + fileNo.value);

  doc.setFont(undefined,"bold");
  center(office.value);
  doc.setFont(undefined,"normal");

  center(address.value);
  right("Dated, " + letterDate.value);

  y+=5;

  // TITLE
  doc.setFont(undefined,"bold");
  center("MEETING NOTICE",2);
  doc.line(pageWidth/2-25,y,pageWidth/2+25,y);
  y+=8;
  doc.setFont(undefined,"normal");

<label>Body Paragraph (Optional)</label>
<textarea id="bodyText" placeholder="Write full meeting notice paragraph OR leave blank to auto-generate"></textarea>

  
  // BODY
  // ===== BODY CONTROL (SMART INPUT) =====

let userBody = document.getElementById("bodyText").value;

let para;

if (userBody.trim() !== "") {
  para = userBody; // full manual control
} else {
  para = `A stakeholder consultation meeting is hereby scheduled on ${meetingDateTime.value} at ${venue.value} to discuss ${subject.value}.`;
}

// 1.5 line spacing
let split = doc.splitTextToSize(para, 180);

split.forEach(line => {
  doc.text(line, 15, y, { maxWidth: 180, align: "justify" });
  y += 9; // 1.5 spacing
});

y += 3;

// second paragraph
let line2 = doc.splitTextToSize(
  "In this context, the below mentioned officials are requested to attend the meeting.",
  180
);

line2.forEach(line => {
  doc.text(line, 15, y, { maxWidth: 180, align: "justify" });
  y += 9;
});

y += 6;
    }
  });

  y+=10;

  doc.setFont(undefined,"bold");
  right(signName.value);
  doc.setFont(undefined,"normal");
  right(designation.value);

  y+=10;

  left("To");
  left("All concerned for kind information.");

  y+=4;

  left("Copy to:-");
  copyTo.value.split("\n").forEach((c,i)=>{
    if(c.trim()){
      doc.text(`${i+1}. ${c}`,18,y);
      y+=6;
    }
  });

  return doc;
}

// ✅ PREVIEW (BEST TEST)
function previewPDF(){
  const doc = generatePDFDoc();
  if (!doc) return;

  const url = doc.output("bloburl");
  window.open(url, "_blank");

  alert("Preview opened. If you see PDF → system is working.");
}

// ✅ DOWNLOAD
function downloadPDF(){
  const doc = generatePDFDoc();
  if (!doc) return;

  doc.save("Meeting_Notice.pdf");
  alert("Download triggered!");
}

// ✅ PRINT
function printPDF(){
  const doc = generatePDFDoc();
  if (!doc) return;

  const url = doc.output("bloburl");
  window.open(url);

  alert("Print window opened!");
}
</script>
</body>
</html>
