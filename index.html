<!DOCTYPE html>
<html>
<head>
  <title>Meeting Notice Generator</title>
  <script src="jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
    button { padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Meeting Notice Generator</h2>

<label>File Number</label>
<input id="fileNo">

<label>Office Name</label>
<input id="office">

<label>Office Address</label>
<input id="address">

<label>Letter Date</label>
<input type="date" id="letterDate">

<label>Meeting Subject</label>
<textarea id="subject"></textarea>

<label>Meeting Date & Time</label>
<input id="meetingDateTime">

<label>Venue</label>
<input id="venue">

<label>Attendees (one per line)</label>
<textarea id="attendees"></textarea>

<label>Signatory Name</label>
<input id="signName">

<label>Designation</label>
<input id="designation">

<label>Dispatch / Copy To</label>
<textarea id="copyTo"></textarea>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="printPDF()">Print</button>

<script>
<script>
<script>
function generatePDFDoc() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  const pageWidth = doc.internal.pageSize.getWidth();
  let y = 15;

  function left(text, space = 6) {
    doc.text(text, 15, y);
    y += space;
  }

  function right(text, space = 6) {
    doc.text(text, pageWidth - 15, y, { align: "right" });
    y += space;
  }

  function center(text, space = 6) {
    doc.text(text, pageWidth / 2, y, { align: "center" });
    y += space;
  }

  function justify(text) {
    let split = doc.splitTextToSize(text, 180);
    doc.text(split, 15, y, { maxWidth: 180, align: "justify" });
    y += split.length * 6;
  }

  function toRoman(num) {
    const roman = ["i","ii","iii","iv","v","vi","vii","viii","ix","x","xi","xii","xiii","xiv","xv"];
    return roman[num] || num;
  }

  // HEADER
  left("No. " + document.getElementById("fileNo").value);

  doc.setFont(undefined, "bold");
  center(document.getElementById("office").value);
  doc.setFont(undefined, "normal");

  center(document.getElementById("address").value);

  right("Dated, " + document.getElementById("letterDate").value);

  y += 5;

  // TITLE
  doc.setFont(undefined, "bold");
  center("MEETING NOTICE", 2);
  doc.line(pageWidth/2 - 25, y, pageWidth/2 + 25, y);
  y += 8;
  doc.setFont(undefined, "normal");

  // BODY
  let para = `A stakeholder consultation meeting is hereby scheduled on ${document.getElementById("meetingDateTime").value} at ${document.getElementById("venue").value} to discuss ${document.getElementById("subject").value}.`;

  justify(para);
  y += 4;

  justify("In this context, the below mentioned officials are requested to attend the meeting.");
  y += 6;

  // ATTENDEES
  let attendees = document.getElementById("attendees").value.split("\n");
  attendees.forEach((p, i) => {
    if (p.trim()) {
      doc.text(`(${toRoman(i)})`, 18, y);
      doc.text(p, 28, y);
      y += 6;
    }
  });

  y += 10;

  // SIGNATURE
  doc.setFont(undefined, "bold");
  doc.text(document.getElementById("signName").value, pageWidth - 15, y, { align: "right" });
  y += 6;

  doc.setFont(undefined, "normal");
  doc.text(document.getElementById("designation").value, pageWidth - 15, y, { align: "right" });

  y += 10;

  // TO
  left("To");
  left("All concerned for kind information.");

  y += 4;

  // COPY
  left("Copy to:-");
  let copies = document.getElementById("copyTo").value.split("\n");
  copies.forEach((c, i) => {
    if (c.trim()) {
      doc.text(`${i + 1}. ${c}`, 18, y);
      y += 6;
    }
  });

  return doc;
}

// ✅ DOWNLOAD (FIXED)
function downloadPDF() {
  const doc = generatePDFDoc();

  // safer method for mobile
  const blob = doc.output("blob");
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Meeting_Notice.pdf";
  a.click();

  URL.revokeObjectURL(url);
}

// 🖨 PRINT BUTTON
function printPDF() {
  const doc = generatePDFDoc();

  const blob = doc.output("blob");
  const url = URL.createObjectURL(blob);

  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = url;
  document.body.appendChild(iframe);

  iframe.onload = function () {
    iframe.contentWindow.print();
  };
}
</script>

</body>
</html>
